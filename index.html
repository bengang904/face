<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>人脸识别 SQL 系统 V10 PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        :root { --p: #00f2fe; --g: #00ff41; --b: #000; --w: #1a1a1a; --r: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--b); color: #888; font-family: -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; overflow-y: auto; overflow-x: hidden; padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px; }
        .app-node { width: 100%; max-width: 480px; background: #050505; border: 1px solid #111; padding: 15px; border-radius: 8px; margin: 10px 0; display: flex; flex-direction: column; flex-shrink: 0; }
        .header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; color: var(--p); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; align-items: center; }
        .track { height: 2px; background: #111; width: 100%; margin-bottom: 15px; flex-shrink: 0; }
        #fill { height: 100%; background: var(--p); width: 0%; transition: 0.3s; box-shadow: 0 0 10px var(--p); }
        .view-port { position: relative; width: 100%; aspect-ratio: 1; background: #000; border: 1px solid #151515; margin-bottom: 12px; overflow: hidden; border-radius: 4px; flex-shrink: 0; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        #reg-ui { display: none; background: #080808; border: 1px solid #151515; padding: 12px; margin-bottom: 12px; grid-template-columns: 1fr 1fr; gap: 8px; border-radius: 4px; }
        input, select { background: #000; border: 1px solid #222; color: #fff; padding: 12px; font-size: 14px; width: 100%; outline: none; border-radius: 4px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-shrink: 0; }
        .btn { background: #000; border: 1px solid #222; color: #aaa; padding: 14px; font-size: 13px; cursor: pointer; border-radius: 4px; font-weight: bold; text-align: center; transition: 0.2s; }
        .btn:active:not(:disabled) { background: #111; border-color: var(--p); color: #fff; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-g { border-color: var(--g); color: var(--g); }
        #log { margin-top: 10px; font-size: 11px; background: #020202; padding: 10px; border: 1px solid #111; min-height: 80px; color: #777; line-height: 1.5; border-radius: 4px; white-space: pre-wrap; flex-shrink: 0; }
        input[type="file"] { display: none; }
        .cam-switch { display: none; align-items: center; gap: 8px; font-size: 10px; color: #555; cursor: pointer; }
        @media (pointer: coarse) { .cam-switch { display: flex; } }
        .tgl { position: relative; width: 34px; height: 18px; background: #111; border-radius: 10px; border: 1px solid #222; transition: 0.3s; }
        .tgl::after { content: ''; position: absolute; width: 12px; height: 12px; background: var(--p); border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; box-shadow: 0 0 5px var(--p); }
        .tgl.on::after { left: 18px; background: var(--g); box-shadow: 0 0 5px var(--g); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
    </style>
</head>
<body>

<div class="app-node">
    <div class="header">
        <span id="msg">内核自检</span>
        <div class="cam-switch" id="cam-toggle">
            <span>前置</span>
            <div class="tgl" id="tgl-ui"></div>
            <span>后置</span>
        </div>
        <span id="pct">0%</span>
    </div>
    <div class="track"><div id="fill"></div></div>

    <div class="view-port">
        <video id="v" autoplay muted playsinline></video>
        <canvas id="c"></canvas>
    </div>

    <div id="reg-ui">
        <input type="text" id="fn" placeholder="姓名">
        <select id="fg"><option value="男">男</option><option value="女">女</option></select>
        <input type="date" id="fb" style="grid-column: span 2;">
        <button class="btn btn-g" id="c-reg" style="grid-column: span 2;">写入生物识别库</button>
    </div>

    <div class="grid">
        <button class="btn" id="p-reg" disabled>提取面部特征</button>
        <label class="btn">载入数据库<input type="file" id="db-u" accept=".db"></label>
        <button class="btn" id="db-s" disabled>下载数据库</button>
        <button class="btn btn-g" id="auth" disabled>核验模式</button>
    </div>

    <div id="log">等待初始化...</div>
</div>

<script>
    let _db = null, _SQL = null, _tmp = null, _isAuth = false, _facing = 'user';
    const v = document.getElementById('v'), c = document.getElementById('c'), lo = document.getElementById('log');
    const f = document.getElementById('fill'), p = document.getElementById('pct'), m = document.getElementById('msg');
    const ui = document.getElementById('reg-ui'), tgl = document.getElementById('tgl-ui');

    async function startStream() {
        if (v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: _facing, width: {ideal: 640}, height: {ideal: 640} } });
            v.srcObject = s;
            await v.play();
        } catch(e) { lo.innerText = "相机启动失败: " + e; }
    }

    async function setup() {
        try {
            const URL_W = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            uiS(30, "加载 SQL 核心");
            _SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
            uiS(70, "同步视觉模型");
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(URL_W),
                faceapi.nets.faceLandmark68Net.loadFromUri(URL_W),
                faceapi.nets.faceRecognitionNet.loadFromUri(URL_W)
            ]);
            await startStream();
            uiS(100, "就绪");
            document.querySelectorAll('.btn').forEach(b => b.disabled = false);

            const params = new URLSearchParams(window.location.search);
            const dbUrl = params.get('db');
            if (dbUrl) {
                lo.innerText = "正在拉取远程数据库...";
                try {
                    const resp = await fetch(dbUrl);
                    const buf = await resp.arrayBuffer();
                    _db = new _SQL.Database(new Uint8Array(buf));
                    lo.innerText = "远程数据库挂载成功";
                } catch(err) {
                    lo.innerText = "远程同步失败: " + err.message;
                }
            }
            requestAnimationFrame(tick);
        } catch (e) { lo.innerText = "致命错误: " + e; }
    }

    function drawStatic(ctx, w, h) {
        const scanY = ((Math.sin(Date.now() * 0.0015) + 1) / 2) * h;
        ctx.strokeStyle = 'rgba(0, 242, 254, 0.4)';
        ctx.beginPath(); ctx.moveTo(0, scanY); ctx.lineTo(w, scanY); ctx.stroke();
    }

    function drawBox(ctx, box) {
        const { x, y, width: w, height: h } = box;
        const s = 15;
        ctx.strokeStyle = _isAuth ? '#00ff41' : '#00f2fe';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x, y+s); ctx.lineTo(x, y); ctx.lineTo(x+s, y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+w-s, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+s); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y+h-s); ctx.lineTo(x, y+h); ctx.lineTo(x+s, y+h); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s); ctx.stroke();
    }

    async function tick() {
        if (v.readyState === 4) {
            const ds = { width: v.offsetWidth, height: v.offsetHeight };
            if (c.width !== ds.width) { c.width = ds.width; c.height = ds.height; }
            const ctx = c.getContext('2d');
            const det = await faceapi.detectSingleFace(v, new faceapi.TinyFaceDetectorOptions({ inputSize: 256, scoreThreshold: 0.5 })).withFaceLandmarks();
            ctx.clearRect(0, 0, c.width, c.height);
            drawStatic(ctx, c.width, c.height);
            if (det) {
                const res = faceapi.resizeResults(det, ds);
                faceapi.draw.drawFaceLandmarks(c, res);
                drawBox(ctx, res.detection.box);
                if (_isAuth) await performSearch(det);
            }
        }
        requestAnimationFrame(tick);
    }

    async function performSearch(det) {
        if (!_db) return;
        const fullDet = await faceapi.detectSingleFace(v, new faceapi.TinyFaceDetectorOptions({ inputSize: 256 })).withFaceLandmarks().withFaceDescriptor();
        if (!fullDet) return;
        const data = _db.exec("SELECT name, gender, birth, descriptor FROM users");
        if (!data.length || !data[0].values.length) return;
        let best = { d: 1, i: null };
        data[0].values.forEach(r => {
            const dist = faceapi.euclideanDistance(fullDet.descriptor, new Float32Array(JSON.parse(r[3])));
            if (dist < best.d) best = { d: dist, i: r };
        });
        if (best.d < 0.42) {
            lo.innerText = `核验结果: 匹配成功\n姓名: ${best.i[0]}\n性别: ${best.i[1]}\n生日: ${best.i[2]}\n置信度: ${(1 - best.d).toFixed(4)}`;
            lo.style.color = "var(--g)";
        } else {
            lo.innerText = "目标状态: 未登记人员";
            lo.style.color = "var(--r)";
        }
    }

    function uiS(v, s) { f.style.width = v + "%"; p.innerText = v + "%"; m.innerText = s; }

    document.getElementById('cam-toggle').onclick = async () => {
        _facing = _facing === 'user' ? 'environment' : 'user';
        tgl.classList.toggle('on');
        await startStream();
    };

    document.getElementById('db-u').onchange = (e) => {
        const fr = new FileReader();
        fr.onload = function() { _db = new _SQL.Database(new Uint8Array(this.result)); lo.innerText = "本地数据库载入完成"; };
        fr.readAsArrayBuffer(e.target.files[0]);
    };

    document.getElementById('p-reg').onclick = async () => {
        _isAuth = false;
        document.getElementById('p-reg').disabled = true;
        let samples = [];
        const count = 8;
        lo.innerText = `正在启动高精度采样 (0/${count})...`;
        
        for (let i = 0; i < 20 && samples.length < count; i++) {
            const res = await faceapi.detectSingleFace(v, new faceapi.TinyFaceDetectorOptions({ inputSize: 256, scoreThreshold: 0.5 })).withFaceLandmarks().withFaceDescriptor();
            if (res) {
                samples.push(res.descriptor);
                lo.innerText = `采样中: ${samples.length}/${count}...`;
                uiS(Math.floor((samples.length / count) * 100), "特征重构");
            }
            await new Promise(r => setTimeout(r, 100));
        }

        if (samples.length === count) {
            const dims = samples[0].length;
            const avg = new Float32Array(dims);
            for (let i = 0; i < dims; i++) {
                let sum = 0;
                for (let j = 0; j < count; j++) sum += samples[j][i];
                avg[i] = sum / count;
            }
            _tmp = avg;
            ui.style.display = 'grid';
            lo.innerText = "均值化特征提取成功";
            lo.style.color = "var(--p)";
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } else {
            lo.innerText = "环境不稳定，采样失败";
            lo.style.color = "var(--r)";
        }
        document.getElementById('p-reg').disabled = false;
        uiS(100, "就绪");
    };

    document.getElementById('c-reg').onclick = () => {
        if (!_db) { _db = new _SQL.Database(); _db.run("CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT, gender TEXT, birth TEXT, descriptor TEXT);"); }
        const n = document.getElementById('fn').value, g = document.getElementById('fg').value, b = document.getElementById('fb').value;
        if (!n || !b || !_tmp) return alert("必填信息缺失");
        _db.run("INSERT INTO users (name, gender, birth, descriptor) VALUES (?, ?, ?, ?)", [n, g, b, JSON.stringify(Array.from(_tmp))]);
        lo.innerText = "数据已存入: " + n;
        ui.style.display = 'none';
    };

    document.getElementById('db-s').onclick = () => {
        if (!_db) return;
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([_db.export()], {type: "application/octet-stream"}));
        a.download = `视觉数据库_${new Date().getTime()}.db`; a.click();
    };

    document.getElementById('auth').onclick = () => {
        if (!_db) return alert("请先载入数据库");
        _isAuth = !_isAuth;
        document.getElementById('auth').innerText = _isAuth ? "停止核验" : "进入核验模式";
    };

    setup();
</script>
</body>
</html>
